<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>법률자문 FAQ — 씨젠의료재단 준법감사팀</title>
  <style>
    :root {
      --primary: #1a4f8a;
      --primary-light: #2563c0;
      --accent: #e8f0fe;
      --success: #1e7e34;
      --border: #d1d9e6;
      --text: #1a1a2e;
      --muted: #6b7280;
      --bg: #f5f7fb;
      --card-bg: #ffffff;
      --tag-colors: #e8f0fe;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Malgun Gothic', '맑은 고딕', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* 헤더 */
    header {
      background: var(--primary);
      color: #fff;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    header .logo {
      width: 40px; height: 40px;
      background: #fff;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; }
    header p { font-size: 0.8rem; opacity: .8; margin-top: 2px; }
    .db-badge {
      margin-left: auto;
      background: rgba(255,255,255,.15);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.78rem;
    }

    /* 메인 레이아웃 */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 16px 60px;
    }

    /* 검색 영역 */
    .search-section {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 28px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      margin-bottom: 28px;
    }
    .search-section h2 {
      font-size: 1.05rem;
      color: var(--primary);
      margin-bottom: 16px;
    }
    .search-box {
      display: flex;
      gap: 10px;
    }
    .search-box input {
      flex: 1;
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
    }
    .search-box input:focus { border-color: var(--primary-light); }
    .search-box button {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 24px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      white-space: nowrap;
    }
    .search-box button:hover { background: var(--primary-light); }
    .search-box button:disabled { background: #9aa5b4; cursor: not-allowed; }

    /* 추천 키워드 */
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }
    .tag {
      background: var(--accent);
      color: var(--primary);
      border: 1px solid #c7d9f8;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background .15s;
    }
    .tag:hover { background: #d0e3ff; }

    /* 결과 상태 */
    .result-summary {
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 16px;
      padding: 0 4px;
    }
    .result-summary strong { color: var(--primary); }

    /* FAQ 카드 */
    .faq-card {
      background: var(--card-bg);
      border-radius: 14px;
      border: 1px solid var(--border);
      padding: 22px 24px;
      margin-bottom: 14px;
      box-shadow: 0 1px 6px rgba(0,0,0,.05);
      transition: box-shadow .2s;
    }
    .faq-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .category-badge {
      background: var(--accent);
      color: var(--primary);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .dept-label {
      color: var(--muted);
      font-size: 0.78rem;
    }
    .date-label {
      color: var(--muted);
      font-size: 0.78rem;
      margin-left: auto;
    }

    .faq-q {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1.5;
    }
    .faq-q::before {
      content: 'Q. ';
      color: var(--primary);
    }

    .faq-a {
      font-size: 0.92rem;
      color: #374151;
      line-height: 1.75;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }
    .faq-a::before {
      content: 'A. ';
      font-weight: 700;
      color: var(--success);
    }

    .source-label {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--muted);
    }
    .source-label .source-tag {
      flex-shrink: 0;
      background: #f1f5f9;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 0.72rem;
      font-weight: 600;
      color: #475569;
      white-space: nowrap;
    }
    .source-label .source-title {
      line-height: 1.5;
      word-break: break-all;
    }

    /* 로딩 */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--muted);
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 에러 */
    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 16px 20px;
      color: #b91c1c;
      font-size: 0.9rem;
    }

    /* 초기 안내 */
    .hint-box {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
    }
    .hint-box .icon { font-size: 48px; margin-bottom: 12px; }
    .hint-box p { font-size: 0.95rem; line-height: 1.7; }

    /* 반응형 */
    @media (max-width: 600px) {
      .search-box { flex-direction: column; }
      .search-box button { width: 100%; }
      header h1 { font-size: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">⚖️</div>
  <div>
    <h1>법률자문 FAQ 검색</h1>
    <p>씨젠의료재단 준법감사팀 — 실제 법률자문 사례 기반</p>
  </div>
  <div class="db-badge" id="db-badge">데이터 로딩 중...</div>
</header>

<main>
  <section class="search-section">
    <h2>키워드로 법률자문 사례를 검색하세요</h2>
    <div class="search-box">
      <input
        type="text"
        id="searchInput"
        placeholder="예: 임대차 계약, 개인정보, 징계, 리베이트..."
        autocomplete="off"
      />
      <button id="searchBtn" onclick="doSearch()">검색</button>
    </div>
    <div class="tag-list">
      <span class="tag" onclick="setQuery('임대차')">임대차</span>
      <span class="tag" onclick="setQuery('개인정보')">개인정보</span>
      <span class="tag" onclick="setQuery('계약 해지')">계약 해지</span>
      <span class="tag" onclick="setQuery('징계 해고')">징계 해고</span>
      <span class="tag" onclick="setQuery('리베이트')">리베이트</span>
      <span class="tag" onclick="setQuery('전세권')">전세권</span>
      <span class="tag" onclick="setQuery('개인정보 제공')">개인정보 제공</span>
      <span class="tag" onclick="setQuery('김영란법')">김영란법</span>
      <span class="tag" onclick="setQuery('상표 등록')">상표 등록</span>
      <span class="tag" onclick="setQuery('근저당')">근저당</span>
    </div>
  </section>

  <div id="results">
    <div class="hint-box">
      <div class="icon">🔍</div>
      <p>검색어를 입력하면 실제 법률자문 사례에서<br/>관련 Q&amp;A를 찾아드립니다.</p>
    </div>
  </div>
</main>

<script>
  // DB 상태 표시
  fetch('/api/stats')
    .then(r => r.json())
    .then(d => {
      const badge = document.getElementById('db-badge');
      if (d.status === 'ready') {
        badge.textContent = `자문 사례 ${d.total}건`;
        badge.style.background = 'rgba(255,255,255,.2)';
      } else {
        badge.textContent = 'DB 오류';
        badge.style.background = 'rgba(255,80,80,.3)';
      }
    })
    .catch(() => {
      document.getElementById('db-badge').textContent = 'DB 연결 실패';
    });

  // 엔터 키 검색
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  function setQuery(text) {
    document.getElementById('searchInput').value = text;
    doSearch();
  }

  async function doSearch() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return;

    const btn = document.getElementById('searchBtn');
    btn.disabled = true;
    btn.textContent = '검색 중...';
    document.getElementById('results').innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        <p>Gemini AI가 관련 자문 사례를 분석 중입니다...</p>
      </div>`;

    try {
      const res = await fetch('/api/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query }),
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || '서버 오류');
      }

      renderResults(query, data);
    } catch (err) {
      document.getElementById('results').innerHTML = `
        <div class="error-box">오류: ${escapeHtml(err.message)}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = '검색';
    }
  }

  function renderResults(query, data) {
    const container = document.getElementById('results');

    if (!data.faqs || data.faqs.length === 0) {
      container.innerHTML = `
        <div class="hint-box">
          <div class="icon">📭</div>
          <p>"${escapeHtml(query)}"에 대한 관련 자문 사례를 찾지 못했습니다.<br/>다른 키워드로 검색해 보세요.</p>
        </div>`;
      return;
    }

    const summaryHtml = `
      <div class="result-summary">
        "<strong>${escapeHtml(query)}</strong>" 검색 결과 — ${data.summary || ''} (관련 ${data.totalFound || data.faqs.length}건)
      </div>`;

    const cardsHtml = data.faqs.map(faq => {
      const sourcePart = faq.sourceTitle ? `
        <div class="source-label">
          <span class="source-tag">원본 게시물</span>
          <span class="source-title">${escapeHtml(faq.sourceTitle)}</span>
        </div>` : '';
      return `
      <div class="faq-card">
        <div class="card-meta">
          <span class="category-badge">${escapeHtml(faq.category || '기타')}</span>
          <span class="dept-label">${escapeHtml(faq.requesterDept || '')}</span>
          <span class="date-label">${escapeHtml(faq.date || '')}</span>
        </div>
        <div class="faq-q">${escapeHtml(faq.question)}</div>
        <div class="faq-a">${escapeHtml(faq.answer)}</div>
        ${sourcePart}
      </div>`;
    }).join('');

    container.innerHTML = summaryHtml + cardsHtml;
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>

</body>
</html>
