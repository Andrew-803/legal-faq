<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>법률자문 아카이브 — 씨젠의료재단 준법감사팀</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    :root {
      --teal:        #2f6f6b;
      --teal-dark:   #245854;
      --teal-mid:    #3a8d88;
      --teal-light:  #6aa39f;
      --teal-xlight: #e7f0ef;
      --teal-pale:   #cfe0de;
      --white:       #ffffff;
      --bg:          #f0f1f2;
      --text:        #1a1c1e;
      --text-mid:    #3a4045;
      --muted:       #5f6368;
      --placeholder: #9aa0a5;
      --border:      #dfe2e4;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', 'Malgun Gothic', '맑은 고딕', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HERO ───────────────────────────── */
    .hero {
      background: var(--teal);
      padding: 52px 24px 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 640px;
      margin-bottom: 44px;
    }

    .hero-eyebrow {
      font-size: 11.5px;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
    }

    .db-badge {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 20px;
      padding: 4px 13px;
      transition: background 0.2s;
    }

    .db-badge.error {
      background: rgba(255,80,80,0.2);
      border-color: rgba(255,80,80,0.3);
    }

    .hero-title {
      font-size: 40px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
      text-wrap: balance;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .hero-subtitle {
      font-size: 16px;
      font-weight: 400;
      color: rgba(255,255,255,0.68);
      margin-bottom: 36px;
      line-height: 1.6;
    }

    /* Search bar */
    .search-bar {
      width: 100%;
      max-width: 600px;
      background: #fff;
      border-radius: 18px;
      display: flex;
      align-items: center;
      padding: 0 8px 0 20px;
      gap: 10px;
      box-shadow: 0 24px 60px -20px rgba(10,25,30,.35);
      height: 64px;
      margin-bottom: 20px;
    }

    .search-icon {
      flex-shrink: 0;
      color: var(--teal-light);
    }

    .search-bar input {
      flex: 1;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 15px;
      font-weight: 400;
      color: var(--text);
      background: transparent;
      min-width: 0;
    }

    .search-bar input::placeholder {
      color: var(--placeholder);
    }

    .search-btn {
      flex-shrink: 0;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 0 22px;
      height: 46px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .search-btn:hover  { background: var(--teal-dark); }
    .search-btn:disabled { background: var(--teal-light); cursor: not-allowed; }

    /* Tag pills */
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 600px;
    }

    .tag {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.82);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }

    .tag:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.32);
      color: #fff;
    }

    /* ── RESULTS ────────────────────────── */
    .results-wrap {
      max-width: 700px;
      margin: 0 auto;
      padding: 36px 20px 64px;
    }

    /* Initial hint */
    .hint-box {
      text-align: center;
      padding: 64px 24px;
      color: var(--muted);
    }

    .hint-icon {
      font-size: 36px;
      margin-bottom: 14px;
      opacity: 0.45;
    }

    .hint-box p {
      font-size: 15px;
      line-height: 1.75;
    }

    /* Result header */
    .result-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 6px;
    }

    .result-label {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .result-count {
      font-size: 13px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    .result-summary {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 22px;
      line-height: 1.6;
    }

    .result-summary strong { color: var(--text-mid); font-weight: 600; }

    /* FAQ Cards */
    .faq-card {
      background: var(--white);
      border-radius: 14px;
      padding: 20px 22px;
      margin-bottom: 12px;
      box-shadow: 0 6px 20px -12px rgba(20,30,40,.18);
      transition: box-shadow 0.2s, transform 0.15s;
    }

    .faq-card:hover {
      box-shadow: 0 12px 32px -10px rgba(20,30,40,.2);
      transform: translateY(-1px);
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .category-badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--teal);
      background: var(--teal-xlight);
      border-radius: 6px;
      padding: 3px 9px;
    }

    .dept-label {
      font-size: 12px;
      color: var(--muted);
    }

    .date-label {
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
      font-variant-numeric: tabular-nums;
    }

    .faq-q {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 10px;
    }

    .faq-q::before {
      content: 'Q. ';
      color: var(--teal);
    }

    .faq-a {
      font-size: 13.5px;
      color: var(--text-mid);
      line-height: 1.8;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }

    .faq-a::before {
      content: 'A. ';
      font-weight: 700;
      color: var(--teal-mid);
    }

    .source-label {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .source-tag {
      flex-shrink: 0;
      background: var(--teal-xlight);
      color: var(--teal);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      margin-top: 1px;
    }

    .source-title {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
      word-break: break-word;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 2.5px solid var(--border);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 14px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .spinner { animation: none; } }

    .loading p { font-size: 14px; }

    /* Error */
    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 14px 18px;
      color: #b91c1c;
      font-size: 14px;
    }

    /* No results */
    .no-results {
      text-align: center;
      padding: 60px 24px;
    }

    .no-results p {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.75;
    }

    /* ── RESPONSIVE ─────────────────────── */
    @media (max-width: 600px) {
      .hero           { padding: 40px 18px 52px; }
      .hero-title     { font-size: 28px; }
      .hero-subtitle  { font-size: 15px; }
      .search-bar     { height: 58px; padding: 0 6px 0 16px; border-radius: 14px; }
      .search-btn     { height: 42px; padding: 0 16px; font-size: 13px; }
      .hero-top       { margin-bottom: 32px; }
    }
  </style>
</head>
<body>

<!-- ── HERO ─────────────────────────────────────────────── -->
<section class="hero">
  <div class="hero-top">
    <span class="hero-eyebrow">씨젠의료재단 준법감사팀</span>
    <div class="db-badge" id="db-badge">로딩 중...</div>
  </div>

  <h1 class="hero-title">사내 법률자문 아카이브</h1>
  <p class="hero-subtitle">과거 자문 사례에서 답을 찾으세요</p>

  <div class="search-bar">
    <svg class="search-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
      <circle cx="8.5" cy="8.5" r="5.25" stroke="currentColor" stroke-width="1.75"/>
      <line x1="12.2" y1="12.2" x2="17" y2="17" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
    </svg>
    <input
      type="text"
      id="searchInput"
      placeholder="임대차, 개인정보, 징계, 계약 해지..."
      autocomplete="off"
      aria-label="법률자문 검색"
    />
    <button class="search-btn" id="searchBtn" onclick="doSearch()">검색</button>
  </div>

  <div class="tag-list" role="list" aria-label="추천 검색어">
    <span class="tag" role="listitem" onclick="setQuery('임대차')">임대차</span>
    <span class="tag" role="listitem" onclick="setQuery('개인정보')">개인정보</span>
    <span class="tag" role="listitem" onclick="setQuery('계약 해지')">계약 해지</span>
    <span class="tag" role="listitem" onclick="setQuery('징계 해고')">징계 해고</span>
    <span class="tag" role="listitem" onclick="setQuery('리베이트')">리베이트</span>
    <span class="tag" role="listitem" onclick="setQuery('전세권')">전세권</span>
    <span class="tag" role="listitem" onclick="setQuery('개인정보 제공')">개인정보 제공</span>
    <span class="tag" role="listitem" onclick="setQuery('김영란법')">김영란법</span>
    <span class="tag" role="listitem" onclick="setQuery('상표 등록')">상표 등록</span>
    <span class="tag" role="listitem" onclick="setQuery('근저당')">근저당</span>
  </div>
</section>

<!-- ── RESULTS ───────────────────────────────────────────── -->
<div class="results-wrap">
  <div id="results">
    <div class="hint-box">
      <div class="hint-icon">⚖️</div>
      <p>검색어를 입력하면 실제 법률자문 사례에서<br>관련 Q&amp;A를 찾아드립니다.</p>
    </div>
  </div>
</div>

<script>
  // DB 상태 배지
  fetch('/api/stats')
    .then(r => r.json())
    .then(d => {
      const badge = document.getElementById('db-badge');
      if (d.status === 'ready') {
        badge.textContent = `자문 사례 ${d.total}건`;
      } else {
        badge.textContent = 'DB 오류';
        badge.classList.add('error');
      }
    })
    .catch(() => {
      const badge = document.getElementById('db-badge');
      badge.textContent = 'DB 연결 실패';
      badge.classList.add('error');
    });

  // 엔터 검색
  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  function setQuery(text) {
    document.getElementById('searchInput').value = text;
    doSearch();
  }

  async function doSearch() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return;

    const btn = document.getElementById('searchBtn');
    btn.disabled = true;
    btn.textContent = '검색 중...';

    document.getElementById('results').innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        <p>Gemini AI가 관련 자문 사례를 분석 중입니다...</p>
      </div>`;

    try {
      const res = await fetch('/api/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '서버 오류');
      renderResults(query, data);
    } catch (err) {
      document.getElementById('results').innerHTML =
        `<div class="error-box">오류: ${escapeHtml(err.message)}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = '검색';
    }
  }

  function renderResults(query, data) {
    const container = document.getElementById('results');

    if (!data.faqs || data.faqs.length === 0) {
      container.innerHTML = `
        <div class="no-results">
          <p>"<strong>${escapeHtml(query)}</strong>"에 대한 관련 자문 사례를 찾지 못했습니다.<br>다른 키워드로 검색해 보세요.</p>
        </div>`;
      return;
    }

    const headerHtml = `
      <div class="result-header">
        <span class="result-label">검색 결과</span>
        <span class="result-count">${data.totalFound || data.faqs.length}건</span>
      </div>
      <div class="result-summary">
        "<strong>${escapeHtml(query)}</strong>" — ${escapeHtml(data.summary || '')}
      </div>`;

    const cardsHtml = data.faqs.map(faq => {
      const sourcePart = faq.sourceTitle ? `
        <div class="source-label">
          <span class="source-tag">원본 게시물</span>
          <span class="source-title">${escapeHtml(faq.sourceTitle)}</span>
        </div>` : '';
      return `
        <div class="faq-card">
          <div class="card-meta">
            <span class="category-badge">${escapeHtml(faq.category || '기타')}</span>
            <span class="dept-label">${escapeHtml(faq.requesterDept || '')}</span>
            <span class="date-label">${escapeHtml(faq.date || '')}</span>
          </div>
          <div class="faq-q">${escapeHtml(faq.question)}</div>
          <div class="faq-a">${escapeHtml(faq.answer)}</div>
          ${sourcePart}
        </div>`;
    }).join('');

    container.innerHTML = headerHtml + cardsHtml;

    // 결과 영역으로 스크롤
    document.querySelector('.results-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>

</body>
</html>
